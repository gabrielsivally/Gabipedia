<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabipedia</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        📖 <span>Gabipedia</span>
    </div>

</header>

<section class="hero">

    <h1>Gabipedia</h1>

    <p>Tudo o que eu gosto em um só lugar.</p>

</section>

<div class="search">

    <input
        type="text"
        placeholder="Pesquisar..."
    >

</div>

<main class="grid">

    <div class="card">
        <img src="assets/pokemon.jpg">
        <h2>Pokémon</h2>
    </div>

    <div class="card">
        <img src="assets/anime.jpg">
        <h2>Animes</h2>
    </div>

    <div class="card">
        <img src="assets/games.jpg">
        <h2>Jogos</h2>
    </div>

    <div class="card">
        <img src="assets/movie.jpg">
        <h2>Filmes & Séries</h2>
    </div>

    <div class="card">
        <img src="assets/music.jpg">
        <h2>Música</h2>
    </div>

    <div class="card">
        <img src="assets/food.jpg">
        <h2>Comidas</h2>
    </div>

    <div class="card">
        <img src="assets/books.jpg">
        <h2>Livros</h2>
    </div>

    <div class="card">
        <img src="assets/sports.jpg">
        <h2>Esportes</h2>
    </div>

    <div class="card">
        <img src="assets/interests.jpg">
        <h2>Interesses</h2>
    </div>

</main>

<footer>

    Gabipedia • Versão 1.0

</footer>

<script src="script.js"></script>

</body>
</html>
